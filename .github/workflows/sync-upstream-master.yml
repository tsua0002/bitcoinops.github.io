name: Sync upstream master and main

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.ref == 'refs/heads/automation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          ref: automation
          fetch-depth: 0

      - name: Configure remotes
        run: |
          git remote add upstream https://github.com/bitcoinops/bitcoinops.github.io.git
          git fetch upstream master
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Create PR to sync master
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync: Update master from upstream"
          title: "Sync: Update master from upstream"
          body: "Automated sync from bitcoinops/bitcoinops.github.io master branch"
          branch: sync-upstream-master
          base: master
          delete-branch: true

      - name: Create PR to sync main
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Sync: Update main from upstream"
          title: "Sync: Update main from upstream"
          body: "Automated sync from bitcoinops/bitcoinops.github.io master branch"
          branch: sync-upstream-main
          base: main
          delete-branch: true
