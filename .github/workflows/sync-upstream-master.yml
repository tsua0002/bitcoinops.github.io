name: Sync upstream master and main

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    if: github.ref == 'refs/heads/automation'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation branch
        uses: actions/checkout@v4
        with:
          ref: automation
          fetch-depth: 0
          token: ${{ secrets.BYPASS_PAT }}

      - name: Configure git and add upstream
        run: |
          git remote add upstream https://github.com/bitcoinops/bitcoinops.github.io.git
          git fetch upstream master
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Sync and push master branch
        run: |
          git checkout master
          git fetch origin master
          git merge --ff-only upstream/master || true
          git push origin master

      - name: Sync and push main branch
        run: |
          git checkout main
          git fetch origin main
          git merge --ff-only upstream/master || true
          git push origin main
